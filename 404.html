<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=index.html">
<title>Redirecting...</title>
</head>
<body>
<script>
// রিডাইরেক্ট করার চেষ্টা করছে
var path = window.location.pathname;
if (path !== '/' && path !== '/index.html') {
  // সেশন/লোকালস্টোরেজ ধরে রাখতে index.html লোড করছে
  window.location.replace('/index.html?page=' + encodeURIComponent(path));
}
</script>
<p>রিডাইরেক্ট হচ্ছে...</p>
</body>
</html>
