<nav class="navbar navbar-expand-lg navbar-dark"><div class="container"><button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"><span class="navbar-toggler-icon"></span></button><div class="collapse navbar-collapse" id="mainNav"><ul class="navbar-nav me-auto"><li class="nav-item"><a class="nav-link" href="index.html">হোম পেজ</a></li><li class="nav-item"><a class="nav-link" href="notice-board.html">নোটিশ বোর্ড</a></li><li class="nav-item"><a class="nav-link admin-link active" href="admin-login.html">🔑 অ্যাডমিন</a></li></ul></div></div></nav>
<div class="container">
  <div class="admin-login-box">
    <div class="admin-panel">
      <div class="admin-header"><h3>অ্যাডমিন লগইন</h3></div>
      <div class="admin-body">
        <div class="error-msg" id="loginError">ভুল ইউজারনেম বা পাসওয়ার্ড!</div>
        <div class="form-group">
          <label>ইউজারনেম</label>
          <input type="text" id="loginUser" class="form-control" placeholder="ইউজারনেম">
        </div>
        <div class="form-group">
          <label>পাসওয়ার্ড</label>
          <input type="password" id="loginPass" class="form-control" placeholder="পাসওয়ার্ড">
        </div>
        <button onclick="adminLogin()" class="btn-admin w-100">লগইন</button>
      </div>
    </div>
    <div class="text-center mt-3"><a href="index.html">← হোম পেজে ফিরে যান</a></div>
  </div>
</div>
<footer class="footer"><div class="container"><div class="row"><div class="col-md-12 text-center"><p>&copy; <span id="footerYear"></span> Satkhira Government College</p></div></div></div></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="data.js"></script>
<script>
document.getElementById('footerYear').textContent = new Date().getFullYear();
document.getElementById('loginUser').addEventListener('keydown', function(e) { if(e.key==='Enter') adminLogin(); });
document.getElementById('loginPass').addEventListener('keydown', function(e) { if(e.key==='Enter') adminLogin(); });
function adminLogin() {
  const u = document.getElementById('loginUser').value;
  const p = document.getElementById('loginPass').value;
  if (u === 'admin' && p === 'admin123') {
    localStorage.setItem('sgc_admin', 'true');
    window.location.href = 'admin-panel.html';
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
</script>
</body></html>
